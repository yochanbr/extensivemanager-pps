<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extensive Manager - Secure Login</title>
    <!-- Add FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../js/security.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #EBE5DF;
            color: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Abstract Background Elements for Premium Feel */
        .bg-shape-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(249, 90, 44, 0.1) 0%, rgba(235, 229, 223, 0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .bg-shape-2 {
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(10, 10, 10, 0.05) 0%, rgba(235, 229, 223, 0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .login-wrapper {
            display: flex;
            background: #FFFFFF;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 900px;
            max-width: 95%;
            min-height: 550px;
            overflow: hidden;
            z-index: 1;
            position: relative;
        }

        /* Left Side: Branding / Imagery */
        .branding-panel {
            background: #0A0A0A;
            color: #FFFFFF;
            width: 45%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .branding-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(249, 90, 44, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
            pointer-events: none;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2;
        }

        .logo-area i {
            color: #F95A2C;
            font-size: 32px;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .logo-text p {
            color: #A3A3A3;
            font-size: 13px;
        }

        .branding-content {
            z-index: 2;
        }

        .branding-content h2 {
            font-size: 36px;
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .branding-content p {
            color: #A3A3A3;
            font-size: 15px;
            line-height: 1.5;
        }

        .credit {
            z-index: 2;
            color: #A3A3A3;
            font-size: 12px;
        }

        /* Right Side: Login Form */
        .login-panel {
            width: 55%;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #FFFFFF;
        }

        .login-header {
            margin-bottom: 40px;
        }

        .login-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #64748B;
            font-size: 15px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #A3A3A3;
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            background: #F8FAFC;
            font-size: 15px;
            color: #1A1A1A;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #0A0A0A;
            background: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(10, 10, 10, 0.05);
        }

        .submit-btn {
            background-color: #0A0A0A;
            color: #FFFFFF;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #F95A2C;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                min-height: auto;
            }

            .branding-panel {
                width: 100%;
                padding: 30px;
                min-height: 250px;
            }

            .login-panel {
                width: 100%;
                padding: 30px;
            }

            .branding-content h2 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-shape-1"></div>
    <div class="bg-shape-2"></div>

    <div class="login-wrapper">
        <!-- ... existing left panel ... -->
        <div class="branding-panel">
            <div class="logo-area">
                <i class="fas fa-certificate"></i>
                <div class="logo-text">
                    <h1>Extensive Manager</h1>
                    <p>By PinPoint Startups</p>
                </div>
            </div>
            <div class="branding-content">
                <h2>Good<br>Afternoon</h2>
                <p>Welcome to the central workforce and analytics command center.</p>
            </div>
            <div class="credit">
                Designed By Yochan
            </div>
        </div>

        <!-- Right Side Login Form -->
        <div class="login-panel">
            <div class="login-header">
                <h2>LOGIN</h2>
                <p>Please enter your credentials.</p>
            </div>
            <form id="namma-mart-login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="login-submit-btn">Check My Credentials</button>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="#" id="forgot-password-link" style="color: #64748B; font-size: 13px; text-decoration: none; font-weight: 500; transition: color 0.2s;">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ROLE SELECTION MODAL -->
    <div id="forgot-password-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; width: 90%; max-width: 450px; border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); position: relative; animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);">
            <button id="close-forgot-modal" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 24px; color: #94A3B8; cursor: pointer;">&times;</button>
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="width: 64px; height: 64px; background: #FDE6E1; color: #F95A2C; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 20px;">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h3 style="font-size: 22px; font-weight: 800; color: #1E293B; margin-bottom: 8px;">Identity Verification</h3>
                <p style="color: #64748B; font-size: 14px;">Select your role to proceed with password recovery</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <button id="forgot-role-employee" style="background: #F8FAFC; border: 1px solid #E2E8F0; padding: 18px; border-radius: 16px; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 16px;">
                    <div style="width: 40px; height: 40px; border-radius: 12px; background: #EEF2FF; color: #6366F1; display: flex; align-items: center; justify-content: center; font-size: 16px;">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <div style="font-weight: 700; color: #1E293B; font-size: 15px;">I am an Employee</div>
                        <div style="font-size: 12px; color: #64748B;">Contact admin for access</div>
                    </div>
                </button>
                <button id="forgot-role-admin" style="background: #F8FAFC; border: 1px solid #E2E8F0; padding: 18px; border-radius: 16px; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; gap: 16px;">
                    <div style="width: 40px; height: 40px; border-radius: 12px; background: #FFF7ED; color: #F97316; display: flex; align-items: center; justify-content: center; font-size: 16px;">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div>
                        <div style="font-weight: 700; color: #1E293B; font-size: 15px;">I am an Admin</div>
                        <div style="font-size: 12px; color: #64748B;">Request secure security OTP</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <style>
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        #forgot-role-employee:hover, #forgot-role-admin:hover {
            background: #FFFFFF !important;
            border-color: #0A0A0A !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hour = new Date().getHours();
            let greeting = 'Good<br>Evening';
            if (hour < 12) greeting = 'Good<br>Morning';
            else if (hour < 17) greeting = 'Good<br>Afternoon';

            const greetingEl = document.querySelector('.branding-content h2');
            if (greetingEl) greetingEl.innerHTML = greeting;

            // Forgot Password logic
            const forgotLink = document.getElementById('forgot-password-link');
            const forgotModal = document.getElementById('forgot-password-modal');
            const closeForgotModal = document.getElementById('close-forgot-modal');
            const employeeBtn = document.getElementById('forgot-role-employee');
            const adminBtn = document.getElementById('forgot-role-admin');

            if (forgotLink && forgotModal) {
                forgotLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    forgotModal.style.display = 'flex';
                });

                closeForgotModal.addEventListener('click', () => {
                    forgotModal.style.display = 'none';
                });

                window.addEventListener('click', (e) => {
                    if (e.target === forgotModal) forgotModal.style.display = 'none';
                });

                employeeBtn.addEventListener('click', () => {
                    forgotModal.style.display = 'none';
                    alert('👤 Employee Access\n\nPlease contact your store manager or administrator to reset your login credentials. If you are an admin, please select the Admin option.');
                });

                adminBtn.addEventListener('click', async () => {
                    const originalContent = adminBtn.innerHTML;
                    adminBtn.disabled = true;
                    adminBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';

                    try {
                        const res = await fetch('/api/request-reset-otp', { method: 'POST' });
                        const data = await res.json();
                        
                        forgotModal.style.display = 'none';
                        if (data.success) {
                            alert('📧 OTP Sent!\n\n' + data.message);
                        } else {
                            alert('❌ Request Failed\n\n' + data.message);
                        }
                    } catch (err) {
                        console.error('Reset Request Error:', err);
                        alert('❌ Network Error\n\nUnable to reach servers. Please try again later.');
                    } finally {
                        adminBtn.disabled = false;
                        adminBtn.innerHTML = originalContent;
                    }
                });
            }
        });
    </script>
    <!-- Keep existing script behavior intact -->
    <script src="../js/script.js"></script>
</body>

</html>
